<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Registration | User Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --slate-950: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-400: #94a3b8;
            --slate-200: #e2e8f0;
            --slate-50: #f8fafc;
            --bg: #ffffff;
            --text: var(--slate-900);
            --text-muted: var(--slate-600);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .split-layout {
            display: flex;
            width: 100%;
        }

        .visual-side {
            flex: 1;
            background: var(--slate-900);
            background-image:
                radial-gradient(circle at 100% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(37, 99, 235, 0.1) 0px, transparent 50%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            color: white;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
        }

        .visual-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .visual-side h2 {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 24px;
            line-height: 1.1;
            z-index: 1;
        }

        .visual-side p {
            font-size: 1.125rem;
            color: var(--slate-400);
            max-width: 440px;
            z-index: 1;
        }

        .form-side {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 60px;
            background: white;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--slate-900);
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 48px;
            font-size: 1rem;
        }

        .form-section {
            margin-bottom: 40px;
        }

        .form-section h3 {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--slate-400);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .form-section h3::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--slate-200);
            margin-left: 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: var(--slate-800);
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            background: var(--slate-50);
            border: 1px solid var(--slate-200);
            border-radius: 12px;
            padding: 14px 18px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus,
        textarea:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--slate-400);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        .footer-text {
            text-align: center;
            margin-top: 40px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.875rem;
            display: none;
            text-align: center;
            font-weight: 500;
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #991b1b;
        }

        .alert.fade-out {
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        @media (max-width: 1024px) {
            .visual-side {
                display: none;
            }

            .form-side {
                flex: 1;
                padding: 60px 20px;
            }

            body {
                background-color: white;
            }
        }
    </style>
</head>

<body>
    <div class="split-layout">
        <div class="visual-side">
            <h2>Join the Next Generation.</h2>
            <p>Become part of a world-class ecosystem designed to empower professionals and scale businesses.</p>
        </div>
        <div class="form-side">
            <div class="container">
                <h1>Create Account</h1>
                <p class="subtitle">Join our premium community today</p>

                <div id="alert" class="alert alert-error"></div>

                <form action="register_process.php" method="POST">
                    <div class="form-section">
                        <h3>Account Credentials</h3>
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="abebe_b" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="abebe@gmail.com" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Personal Profile</h3>
                        <div class="grid-2">
                            <div class="form-group">
                                <label for="age">Age</label>
                                <input type="number" id="age" name="age" placeholder="25">
                            </div>
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" name="city" placeholder="Addis Ababa">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" name="address" placeholder="Bole, Addis Ababa">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="+251 912 345 678">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>About Yourself</h3>
                        <div class="form-group">
                            <label for="bio">Short Bio</label>
                            <textarea id="bio" name="bio" placeholder="Software developer in Addis Ababa..."
                                style="min-height: 120px; resize: vertical;"></textarea>
                        </div>
                    </div>

                    <button type="submit">Create Account</button>
                </form>

                <p class="footer-text">
                    Already have an account? <a href="login.html">Log in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const alert = document.getElementById('alert');
            alert.textContent = decodeURIComponent(error);
            alert.style.display = 'block';

            // Auto-hide after 5 seconds
            setTimeout(() => {
                alert.classList.add('fade-out');
                setTimeout(() => {
                    alert.style.display = 'none';
                    alert.classList.remove('fade-out');
                }, 500);
            }, 5000);
        }
    </script>
</body>

</html>
