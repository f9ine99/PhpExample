<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-400: #94a3b8;
            --slate-200: #e2e8f0;
            --slate-100: #f1f5f9;
            --slate-50: #f8fafc;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: var(--slate-200);
            --text: var(--slate-900);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.02) 0px, transparent 50%),
                radial-gradient(circle at 100% 0%, rgba(37, 99, 235, 0.02) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            color: var(--slate-900);
            letter-spacing: -0.02em;
        }

        .logout-btn {
            background: #ffffff;
            color: #ef4444;
            border: 1px solid #fee2e2;
            padding: 10px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .logout-btn:hover {
            background: #fef2f2;
            border-color: #fca5a5;
            transform: translateY(-1px);
        }

        .table-wrapper {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                0 1px 3px 0 rgba(0, 0, 0, 0.1),
                0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: var(--slate-50);
            padding: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--slate-600);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            color: var(--slate-700);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--slate-50);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-weight: 600;
            color: var(--slate-900);
        }

        .email {
            font-size: 0.85rem;
            color: var(--slate-600);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-admin {
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #dbeafe;
        }

        .badge-user {
            background: #f8fafc;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .loading {
            padding: 60px;
            text-align: center;
            color: var(--slate-600);
        }

        .loader {
            width: 28px;
            height: 28px;
            border: 3px solid var(--slate-200);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>User Management</h1>
            <a href="logout.php" class="logout-btn">Sign Out</a>
        </header>

        <div class="table-wrapper">
            <div id="loading" class="loading">
                <div class="loader"></div>
                <p>Loading users...</p>
            </div>
            <div class="table-responsive" id="tableContainer" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Age</th>
                            <th>Location</th>
                            <th>Contact/Bio</th>
                            <th>Role</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchUsers() {
            try {
                const response = await fetch('admin_api.php');
                if (response.status === 403) {
                    window.location.href = 'login.html?error=' + encodeURIComponent('Access denied. Please log in as admin.');
                    return;
                }
                if (!response.ok) throw new Error('Failed to fetch data');

                const users = await response.json();
                populateTable(users);
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = '<p style="color: #fca5a5;">Failed to load data. Please refresh.</p>';
            }
        }

        function populateTable(users) {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            users.forEach(user => {
                const tr = document.createElement('tr');

                // Format date
                const date = new Date(user.created_at).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });

                tr.innerHTML = `
                    <td>
                        <div class="user-info">
                            <span class="username">${user.username}</span>
                            <span class="email">${user.email}</span>
                        </div>
                    </td>
                    <td>${user.age || '<span style="color: #475569;">—</span>'}</td>
                    <td>
                        <div class="user-info">
                            <span>${user.city || '<span style="color: #475569;">N/A</span>'}</span>
                            <span style="font-size: 0.8rem; color: #64748b;">${user.address || ''}</span>
                        </div>
                    </td>
                    <td style="font-size: 0.85rem;">
                        <div class="user-info">
                            <span style="font-weight: 500;">${user.phone || '<span style="color: #475569;">—</span>'}</span>
                            <span style="font-size: 0.8rem; color: #64748b; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${user.bio || ''}">${user.bio || ''}</span>
                        </div>
                    </td>
                    <td>
                        <span class="badge ${user.is_admin ? 'badge-admin' : 'badge-user'}">
                            ${user.is_admin ? 'Administrator' : 'Standard User'}
                        </span>
                    </td>
                    <td style="color: #94a3b8;">${date}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';
        }

        // Initial fetch
        fetchUsers();
    </script>
</body>

</html>
